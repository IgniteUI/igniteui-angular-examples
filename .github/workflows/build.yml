name: Build

# This workflow is meant to run on changes pushed to the vnext branch only.
# If it runs on PRs, it will create PRs to the destination repos' vnext branches - we don't want that.
on:
  push:
    branches:
      - vnext
      - master
  workflow_dispatch:
    inputs:
      isVerbose:
        description: 'Get verbose output from steps - where configurable'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: true
          persist-credentials: true
          path: igniteui-angular-examples
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
      
      - name: Install npm dependencies
        run: npm install
        working-directory: ./igniteui-angular-examples/browser
      
      - name: Apply very special configuration
        shell: pwsh
        run: |
          Write-Output $pwd
          ((Get-Content -Path package.json -Raw) -replace 'build --configuration production','build --configuration production --base-href=/angular-demos-dv/') | Set-Content -Path package.json
        working-directory: ./igniteui-angular-examples/browser
      
      - name: Build project
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.isVerbose }}" -eq "true") {
            npm run build --verbose
          } else {
            npm run build
          }
        working-directory: ./igniteui-angular-examples/browser
      
      - name: Copy web.config to dist
        shell: pwsh
        run: |
          Copy-Item web.config dist/browser/
        working-directory: ./igniteui-angular-examples/browser
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ./igniteui-angular-examples/browser/dist/browser
          retention-days: 1
